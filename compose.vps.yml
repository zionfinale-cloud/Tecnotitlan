services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL_PRIMARY: ${CLIENT_URL_PRIMARY}
      CLIENT_URL_SECONDARY: ${CLIENT_URL_SECONDARY}
      UPLOAD_STRATEGY: ${UPLOAD_STRATEGY:-cloudinary}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      MERCADOLIBRE_APP_ID: ${MERCADOLIBRE_APP_ID}
      MERCADOLIBRE_CLIENT_SECRET: ${MERCADOLIBRE_CLIENT_SECRET}
      MERCADOLIBRE_REDIRECT_URI: ${MERCADOLIBRE_REDIRECT_URI}
      N8N_ORDER_WEBHOOK_URL: ${N8N_ORDER_WEBHOOK_URL}
      N8N_SUPPORT_WEBHOOK_URL: ${N8N_SUPPORT_WEBHOOK_URL}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
    volumes:
      - tecnotitlan_uploads:/app/uploads
      - tecnotitlan_whatsapp_auth:/app/auth_info_baileys
    ports:
      - "5000:5000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_PAYPAL_CLIENT_ID: ${REACT_APP_PAYPAL_CLIENT_ID}
        REACT_APP_MERCADOLIBRE_APP_ID: ${REACT_APP_MERCADOLIBRE_APP_ID}
        REACT_APP_MERCADOLIBRE_REDIRECT_URI: ${REACT_APP_MERCADOLIBRE_REDIRECT_URI}
        REACT_APP_RECAPTCHA_SITE_KEY: ${REACT_APP_RECAPTCHA_SITE_KEY}
        GENERATE_SOURCEMAP: "false"
    restart: unless-stopped
    ports:
      - "3000:80"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      GENERIC_TIMEZONE: America/Mexico_City
      TZ: America/Mexico_City
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - tecnotitlan_n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

volumes:
  tecnotitlan_uploads:
  tecnotitlan_whatsapp_auth:
  tecnotitlan_n8n_data:
