name: Frontend E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: npm install --force

      - name: Install Frontend Dependencies
        run: cd frontend && npm install

      # Paso clave: Usamos la acción oficial de Cypress
      # https://github.com/cypress-io/github-action
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # Le decimos a Cypress que inicie tanto el backend como el frontend
          start: |
            npm run server &
            cd frontend && npm start
          # URL que Cypress esperará a que esté disponible antes de correr las pruebas
          wait-on: 'http://localhost:3000'
          # Directorio donde están las pruebas del frontend
          working-directory: frontend
        env:
          # Pasamos las variables de entorno necesarias para el backend
          # CRÍTICO: Estas deben estar configuradas como "Secrets" en tu repositorio de GitHub
          # (Settings > Secrets and variables > Actions)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLIENT_URL_PRIMARY: 'http://localhost:3000'
          # Añade aquí cualquier otra variable que tu backend necesite para arrancar

      # (Opcional) Sube los artefactos de las pruebas (videos, screenshots)
      # para poder revisarlos si una prueba falla.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos