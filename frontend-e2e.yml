name: Frontend E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: npm install --force

      # Paso clave: Usamos la acción oficial de Cypress
      # https://github.com/cypress-io/github-action
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # Ya no iniciamos servidores locales, apuntamos directamente a producción
          # CRÍTICO: Especificamos las rutas exactas de TUS archivos de prueba
          spec: |
            cypress/e2e/auth/login.cy.js
            cypress/e2e/checkout.cy.js
          # Directorio donde están las pruebas del frontend
          working-directory: frontend
        env:
          # CRÍTICO: Sobrescribimos la URL base de Cypress para que apunte a tu sitio en vivo
          # y la URL de la API para que las pruebas del frontend sepan a dónde llamar.
          CYPRESS_BASE_URL: 'https://www.tecnotitlan.com.mx'
          CYPRESS_REACT_APP_API_URL: 'https://api.tecnotitlan.com.mx'

      # (Opcional) Sube los artefactos de las pruebas (videos, screenshots)
      # para poder revisarlos si una prueba falla.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos